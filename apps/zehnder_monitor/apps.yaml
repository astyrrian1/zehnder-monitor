---
# Zehnder ComfoAir Q600 Filter Health Monitor
# Runs at 60s intervals, publishing to HA sensors and MQTT.
#
# Deploy: Copy/symlink this directory to your AppDaemon apps/ folder.
#   e.g. ln -s ~/zehnder-monitor/apps/zehnder_monitor ~/appdaemon/apps/zehnder_monitor

zehnder_monitor:
  module: zehnder_monitor
  class: ZehnderMonitor
